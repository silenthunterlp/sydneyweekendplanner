<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sydney Weekend Planner</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <div class="header-content">
        <div>
          <h1>🌊 Sydney Weekend Planner</h1>
          <p class="subtitle">Your AI guide to the perfect Sydney weekend</p>
        </div>
        <div class="status-bar">
          <span id="status-dot" class="status-dot connecting"></span>
          <span id="status-text" class="status-text">Connecting…</span>
        </div>
      </div>
    </header>

    <div id="chat-container">
      <div id="messages"></div>

      <div id="suggestion-chips"></div>

      <div id="input-area">
        <textarea
          id="user-input"
          placeholder="Ask me to plan your Sydney weekend…"
          rows="2"
          autofocus
        ></textarea>
        <button id="send-btn">Send ↑</button>
      </div>
      <p class="hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</p>
    </div>
  </div>
  <script src="/static/chat.js"></script>
</body>
</html>
